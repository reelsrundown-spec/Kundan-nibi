<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe - Gameplay</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 10px; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; max-width: 350px; margin: 0 auto; }
        .back-btn { background: #2c3e50; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; text-decoration: none; font-size: 14px; }
        
        #status { font-size: 1.2rem; margin: 20px 0; color: #00d2ff; font-weight: bold; height: 30px; }
        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 300px; margin: 0 auto; background: #333; padding: 10px; border-radius: 15px; }
        .cell { width: 90px; height: 90px; background: #1e1e1e; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .cell.x { color: #ff6b6b; }
        .cell.o { color: #00d2ff; }
        
        .footer { margin-top: 30px; color: #666; font-size: 12px; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="tichome.html" class="back-btn">← Quit</a>
        <span id="mode-text">Loading...</span>
    </div>

    <div id="status">X's Turn</div>

    <div class="board" id="board">
        <div class="cell" onclick="handleMove(0)" id="c0"></div>
        <div class="cell" onclick="handleMove(1)" id="c1"></div>
        <div class="cell" onclick="handleMove(2)" id="c2"></div>
        <div class="cell" onclick="handleMove(3)" id="c3"></div>
        <div class="cell" onclick="handleMove(4)" id="c4"></div>
        <div class="cell" onclick="handleMove(5)" id="c5"></div>
        <div class="cell" onclick="handleMove(6)" id="c6"></div>
        <div class="cell" onclick="handleMove(7)" id="c7"></div>
        <div class="cell" onclick="handleMove(8)" id="c8"></div>
    </div>

    <div class="footer" id="room-info"></div>

    <script src="https://www.gstatic.com/firebasejs/9.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.11.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAC0Ancjw96eamzv0Ja7vMvpETleysfcqQ",
            authDomain: "multiplayer-bingo-e27fd.firebaseapp.com",
            databaseURL: "https://multiplayer-bingo-e27fd-default-rtdb.firebaseio.com",
            projectId: "multiplayer-bingo-e27fd",
            storageBucket: "multiplayer-bingo-e27fd.appspot.com",
            messagingSenderId: "768320492362",
            appId: "1:768320492362:web:ad711f314c523c5a4167b3"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode') || 'ai';
        const roomCode = urlParams.get('room') || 'public_match';

        let board = Array(9).fill("");
        let currentPlayer = "X";
        let gameActive = true;
        let gameRef = null;

        // Setup Header
        document.getElementById('mode-text').innerText = mode.toUpperCase();
        if (mode === 'friend') document.getElementById('room-info').innerText = "Room Code: " + roomCode;

        if (mode !== 'ai') {
            gameRef = database.ref('tictactoe_rooms/' + (mode === 'friend' ? roomCode : 'public'));
            initOnline();
        }

        function handleMove(i) {
            if (board[i] !== "" || !gameActive) return;

            if (mode === 'ai') {
                board[i] = "X";
                updateUI();
                if (!checkWin()) {
                    currentPlayer = "O";
                    setTimeout(aiMove, 500);
                }
            } else {
                board[i] = currentPlayer;
                gameRef.update({ board: board, turn: currentPlayer === "X" ? "O" : "X" });
            }
        }

        function aiMove() {
            let empty = board.map((v, i) => v === "" ? i : null).filter(v => v !== null);
            if (empty.length > 0) {
                board[empty[Math.floor(Math.random() * empty.length)]] = "O";
                currentPlayer = "X";
                updateUI();
                checkWin();
            }
        }

        function initOnline() {
            gameRef.on('value', (snap) => {
                const data = snap.val() || { board: Array(9).fill(""), turn: "X" };
                board = data.board;
                currentPlayer = data.turn;
                updateUI();
                checkWin();
            });
        }

        function updateUI() {
            board.forEach((val, i) => {
                const c = document.getElementById('c' + i);
                c.innerText = val;
                c.className = 'cell ' + val.toLowerCase();
            });
            document.getElementById('status').innerText = currentPlayer + "'s Turn";
        }

        function checkWin() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let c of wins) {
                if (board[c[0]] && board[c[0]] === board[c[1]] && board[c[0]] === board[c[2]]) {
                    document.getElementById('status').innerText = board[c[0]] + " Wins!";
                    gameActive = false;
                    return true;
                }
            }
            if (!board.includes("")) {
                document.getElementById('status').innerText = "Draw!";
                gameActive = false;
                return true;
            }
            return false;
        }
    </script>
</body>
</html>
