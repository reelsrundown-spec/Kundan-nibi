<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo - Game Hub</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 10px; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; max-width: 400px; margin: 0 auto; }
        .back-btn { background: #2c3e50; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; text-decoration: none; font-size: 14px; }
        h2 { color: #ffce00; margin-top: 10px; letter-spacing: 5px; }

        /* Menu Screens */
        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; }
        .active-screen { display: flex; }

        .menu-btn { background: #ffce00; color: #121212; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; font-size: 1.1rem; margin: 10px; cursor: pointer; width: 220px; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #444; width: 200px; background: #222; color: white; margin-bottom: 15px; text-align: center; outline: none; }

        /* Game UI */
        .bingo-letters { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; font-size: 24px; font-weight: bold; }
        .letter { opacity: 0.2; transition: 0.3s; color: #ffce00; }
        .letter.active { opacity: 1; text-shadow: 0 0 10px #ffce00; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; max-width: 350px; margin: 0 auto; background: #333; padding: 10px; border-radius: 12px; }
        .cell { aspect-ratio: 1; background: #1e1e1e; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: bold; cursor: pointer; border: 1px solid #444; }
        .cell.marked { background: #ffce00; color: #121212; border-color: #fff; transform: scale(0.95); }
        #status { margin-top: 20px; font-size: 1.1rem; color: #ffce00; font-weight: bold; }

        /* Result Overlay */
        #resultOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; flex-direction: column;
            justify-content: center; align-items: center;
        }
        #resultText { font-size: 2.5rem; font-weight: bold; margin-bottom: 20px; }
        .win-text { color: #27ae60; }
        .lose-text { color: #e74c3c; }
    </style>
</head>
<body>
    <div class="nav-bar"><a href="index.html" class="back-btn"><- Back</a><span>BINGO</span></div>

    <div id="startScreen" class="screen active-screen">
        <h2>BINGO</h2>
        <button class="menu-btn" onclick="showRoomScreen()">Play with Friends</button>
        <button class="menu-btn" onclick="startAI()">Play with Computer</button>
    </div>

    <div id="roomScreen" class="screen">
        <h2>Enter Room</h2>
        <input type="text" id="roomInput" placeholder="Enter Room Code">
        <button class="menu-btn" onclick="joinRoom()">Join Game</button>
        <button class="back-btn" onclick="showStartScreen()">Back</button>
    </div>

    <div id="gameScreen" class="screen">
        <div class="bingo-letters" id="bingoDisplay">
            <span class="letter">B</span><span class="letter">I</span><span class="letter">N</span><span class="letter">G</span><span class="letter">O</span>
        </div>
        <div id="bingoGrid" class="grid"></div>
        <div id="status">Waiting...</div>
        <button class="back-btn" style="margin-top: 20px;" onclick="location.reload()">Quit Game</button>
    </div>

    <div id="resultOverlay">
        <div id="resultText"></div>
        <button class="menu-btn" onclick="location.reload()">Play Again</button>
    </div>

    <script>
        const clickSound = new Audio('jump.mp3');
        const winSound = new Audio('dora.mp3');
        const loseSound = new Audio('lose.mp3');

        const firebaseConfig = { databaseURL: "https://multiplayer-bingo-e27fd-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let playerBoard = [], markedIndices = new Set(), bingoCount = 0;
        let gameActive = false, currentRoom = "", myId = "p_" + Math.floor(Math.random() * 99999), turnOwner = "";
        let isAI = false;

        function showStartScreen() { switchScreen('startScreen'); }
        function showRoomScreen() { switchScreen('roomScreen'); }
        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
        }

        function startAI() {
            isAI = true;
            gameActive = true;
            switchScreen('gameScreen');
            initBingo();
            document.getElementById('status').innerText = "Your Turn!";
        }

        function joinRoom() {
            const input = document.getElementById('roomInput').value;
            if (!input) return alert("Enter a Room Code!");
            currentRoom = input;
            isAI = false;
            
            db.ref('rooms/' + currentRoom).on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    if (data.winner) { endGame(data.winner); return; }
                    turnOwner = data.turn;
                    if (data.lastMove) syncMove(data.lastMove);
                    updateUI();
                } else { db.ref('rooms/' + currentRoom).set({ turn: myId, lastMove: 0 }); }
            });

            switchScreen('gameScreen');
            initBingo();
            gameActive = true;
        }

        function updateUI() {
            if(isAI) return;
            const statusBox = document.getElementById('status');
            if (turnOwner === myId) { statusBox.innerText = "YOUR TURN!"; statusBox.style.color = "#ffce00"; }
            else { statusBox.innerText = "OPPONENT'S TURN..."; statusBox.style.color = "#888"; }
        }

        function initBingo() {
            const gridElement = document.getElementById('bingoGrid');
            gridElement.innerHTML = '';
            playerBoard = []; markedIndices.clear(); bingoCount = 0;
            let nums = Array.from({length: 25}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
            nums.forEach((num) => {
                playerBoard.push(num);
                const cell = document.createElement('div');
                cell.className = 'cell'; cell.innerText = num;
                cell.onclick = () => handleMove(num);
                gridElement.appendChild(cell);
            });
            updateBingoDisplay();
        }

        function handleMove(num) {
            if (!gameActive) return;
            if (!isAI && turnOwner !== myId) return;
            const idx = playerBoard.indexOf(num);
            if (markedIndices.has(idx)) return;

            if (isAI) {
                markCell(idx);
                if (gameActive) setTimeout(cpuMove, 600);
            } else {
                db.ref('rooms/' + currentRoom).update({ lastMove: num, turn: "waiting" });
            }
        }

        function cpuMove() {
            if (!gameActive) return;
            let unmarked = playerBoard.map((_, i) => !markedIndices.has(i) ? i : null).filter(v => v !== null);
            if (unmarked.length > 0) markCell(unmarked[Math.floor(Math.random() * unmarked.length)]);
        }

        function syncMove(num) {
            if (num === 0) return;
            const index = playerBoard.indexOf(num);
            if (index !== -1 && !markedIndices.has(index)) {
                clickSound.play(); markCell(index);
                if (turnOwner !== myId) db.ref('rooms/' + currentRoom).update({ turn: myId });
            }
        }

        function markCell(index) {
            markedIndices.add(index);
            const cells = document.querySelectorAll('.cell');
            if (cells[index]) cells[index].classList.add('marked');
            clickSound.play();
            checkBingo();
        }

        function checkBingo() {
            let lines = 0, size = 5;
            for (let i = 0; i < size; i++) {
                let r = true, c = true;
                for (let j = 0; j < size; j++) {
                    if (!markedIndices.has(i * size + j)) r = false;
                    if (!markedIndices.has(j * size + i)) c = false;
                }
                if (r) lines++; if (c) lines++;
            }
            let d1 = true, d2 = true;
            for (let i = 0; i < size; i++) {
                if (!markedIndices.has(i * size + i)) d1 = false;
                if (!markedIndices.has(i * size + (size - 1 - i))) d2 = false;
            }
            if (d1) lines++; if (d2) lines++;
            bingoCount = lines; updateBingoDisplay();
            
            if (bingoCount >= 5 && gameActive) {
                if (isAI) { endGame(myId); } 
                else { db.ref('rooms/' + currentRoom).update({ winner: myId }); }
            }
        }

        function endGame(winnerId) {
            gameActive = false;
            const overlay = document.getElementById('resultOverlay');
            const text = document.getElementById('resultText');
            overlay.style.display = 'flex';
            if (winnerId === myId) {
                text.innerText = "നീ ജയിച്ചു! 🎉"; text.className = "win-text"; winSound.play();
            } else {
                text.innerText = "നീ തോറ്റു! 👎"; text.className = "lose-text"; loseSound.play();
            }
        }

        function updateBingoDisplay() {
            const letters = document.querySelectorAll('.letter');
            letters.forEach((l, i) => l.className = i < bingoCount ? 'letter active' : 'letter');
        }
    </script>
</body>
</html>
