<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Online Multiplayer</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 10px; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; max-width: 400px; margin: 0 auto; }
        .back-btn { background: #2c3e50; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; text-decoration: none; font-size: 14px; }
        h2 { color: #ffce00; margin-top: 10px; letter-spacing: 5px; }
        .bingo-letters { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; font-size: 24px; font-weight: bold; }
        .letter { opacity: 0.2; transition: 0.3s; color: #ffce00; }
        .letter.active { opacity: 1; text-shadow: 0 0 10px #ffce00; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; max-width: 350px; margin: 0 auto; background: #333; padding: 10px; border-radius: 12px; }
        .cell { aspect-ratio: 1; background: #1e1e1e; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.2s; border: 1px solid #444; }
        .cell.marked { background: #ffce00; color: #121212; border-color: #fff; transform: scale(0.95); }
        #status { margin-top: 20px; font-size: 1.1rem; color: #aaa; height: 25px; }
        .reset-btn { margin-top: 20px; padding: 12px 30px; background: #ffce00; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: #121212; }
        .room-controls { margin: 15px 0; }
        input { padding: 10px; border-radius: 8px; border: none; width: 150px; outline: none; }
        .join-btn { background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; margin-left: 5px; }
    </style>
</head>
<body>
    <div class="nav-bar">
        <a href="index.html" class="back-btn"><- Back</a>
        <span>BINGO ONLINE</span>
    </div>
    
    <h2>BINGO</h2>

    <div class="room-controls">
        <input type="text" id="roomInput" placeholder="Room Code">
        <button class="join-btn" onclick="joinRoom()">Join</button>
    </div>

    <div class="bingo-letters" id="bingoDisplay">
        <span class="letter">B</span><span class="letter">I</span><span class="letter">N</span><span class="letter">G</span><span class="letter">O</span>
    </div>

    <div id="bingoGrid" class="grid"></div>
    <div id="status">Join a room to start!</div>
    <button class="reset-btn" onclick="initBingo()">Shuffle Board</button>

    <script>
        // Firebase Config with your URL
        const firebaseConfig = {
            databaseURL: "https://multiplayer-bingo-e27fd-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let playerBoard = [];
        let markedIndices = new Set();
        let bingoCount = 0;
        let gameActive = false;
        let currentRoom = "";

        // Function to join a room
        function joinRoom() {
            currentRoom = document.getElementById('roomInput').value;
            if (!currentRoom) return alert("Please enter a Room Code!");
            
            // Listen for moves in the room
            db.ref('rooms/' + currentRoom).on('value', (snapshot) => {
                const data = snapshot.val();
                if (data && data.lastMove) {
                    syncMove(data.lastMove);
                }
            });
            
            gameActive = true;
            document.getElementById('status').innerText = "Connected to Room: " + currentRoom;
        }

        function initBingo() {
            const gridElement = document.getElementById('bingoGrid');
            gridElement.innerHTML = '';
            playerBoard = [];
            markedIndices.clear();
            bingoCount = 0;
            updateBingoDisplay();
            
            // Generate random board
            let nums = Array.from({length: 25}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
            nums.forEach((num, index) => {
                playerBoard.push(num);
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerText = num;
                cell.onclick = () => handleMove(num);
                gridElement.appendChild(cell);
            });
        }

        function handleMove(num) {
            if (!gameActive || !currentRoom) {
                alert("Please join a room first!");
                return;
            }
            // Send the clicked number to Firebase
            db.ref('rooms/' + currentRoom).set({ lastMove: num });
        }

        function syncMove(num) {
            const index = playerBoard.indexOf(num);
            if (index !== -1 && !markedIndices.has(index)) {
                markCell(index);
            }
        }

        function markCell(index) {
            markedIndices.add(index);
            const cells = document.querySelectorAll('.cell');
            if (cells[index]) cells[index].classList.add('marked');
            checkBingo();
        }

        function checkBingo() {
            let lines = 0;
            const size = 5;
            for (let i = 0; i < size; i++) {
                let row = true, col = true;
                for (let j = 0; j < size; j++) {
                    if (!markedIndices.has(i * size + j)) row = false;
                    if (!markedIndices.has(j * size + i)) col = false;
                }
                if (row) lines++;
                if (col) lines++;
            }
            let d1 = true, d2 = true;
            for (let i = 0; i < size; i++) {
                if (!markedIndices.has(i * size + i)) d1 = false;
                if (!markedIndices.has(i * size + (size - 1 - i))) d2 = false;
            }
            if (d1) lines++; if (d2) lines++;
            bingoCount = lines;
            updateBingoDisplay();
            if (bingoCount >= 5) {
                document.getElementById('status').innerText = "BINGO! YOU WIN! 🎉";
                gameActive = false;
            }
        }

        function updateBingoDisplay() {
            const letters = document.querySelectorAll('.letter');
            letters.forEach((l, i) => l.className = i < bingoCount ? 'letter active' : 'letter');
        }

        initBingo();
    </script>
</body>
</html>
