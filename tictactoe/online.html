<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe - Online Multiplayer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 10px; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; max-width: 400px; margin: 0 auto; padding: 10px; }
        .back-btn { background: #2c3e50; color: white; border: none; padding: 10px 18px; border-radius: 12px; text-decoration: none; font-size: 14px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        #status { font-size: 1.4rem; margin: 25px 0; font-weight: bold; color: #00d2ff; min-height: 40px; text-shadow: 0 0 10px rgba(0,210,255,0.3); }
        
        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; max-width: 320px; margin: 0 auto; background: #222; padding: 15px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .cell { width: 90px; height: 90px; background: #1a1a1a; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 2.8rem; font-weight: 900; cursor: pointer; transition: 0.2s; border: 1px solid #333; }
        .cell.x { color: #ff6b6b; text-shadow: 0 0 15px #ff6b6b; }
        .cell.o { color: #00d2ff; text-shadow: 0 0 15px #00d2ff; }
        
        /* Win Animation */
        .cell.winner { background: #00d2ff !important; color: #121212 !important; box-shadow: 0 0 25px #00d2ff; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .restart-btn { margin-top: 35px; background: #ffce00; color: #121212; border: none; padding: 14px 35px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; box-shadow: 0 5px 15px rgba(255,206,0,0.2); }
        .restart-btn:active { transform: scale(0.95); }
        
        #player-type { color: #ffce00; font-size: 14px; font-weight: bold; letter-spacing: 1px; }
        #room-display { margin-top: 25px; font-size: 12px; color: #666; font-weight: bold; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="../tichome.html" class="back-btn">← EXIT</a>
        <span id="player-type">INITIALIZING...</span>
    </div>

    <div id="status">CONNECTING TO SERVER...</div>

    <div class="board" id="board">
        <div class="cell" onclick="makeMove(0)" id="c0"></div>
        <div class="cell" onclick="makeMove(1)" id="c1"></div>
        <div class="cell" onclick="makeMove(2)" id="c2"></div>
        <div class="cell" onclick="makeMove(3)" id="c3"></div>
        <div class="cell" onclick="makeMove(4)" id="c4"></div>
        <div class="cell" onclick="makeMove(5)" id="c5"></div>
        <div class="cell" onclick="makeMove(6)" id="c6"></div>
        <div class="cell" onclick="makeMove(7)" id="c7"></div>
        <div class="cell" onclick="makeMove(8)" id="c8"></div>
    </div>

    <button class="restart-btn" onclick="requestRestart()">RESTART MATCH</button>
    
    <div id="room-display">ROOM ID: NONE</div>

    <script src="https://www.gstatic.com/firebasejs/9.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.11.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAC0Ancjw96eamzv0Ja7vMvpETleysfcqQ",
            authDomain: "multiplayer-bingo-e27fd.firebaseapp.com",
            databaseURL: "https://multiplayer-bingo-e27fd-default-rtdb.firebaseio.com",
            projectId: "multiplayer-bingo-e27fd",
            storageBucket: "multiplayer-bingo-e27fd.appspot.com",
            messagingSenderId: "768320492362",
            appId: "1:768320492362:web:ad711f314c523c5a4167b3"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const roomCode = urlParams.get('room') || 'public_lobby';
        const gameRef = database.ref('ttt_online/' + roomCode);

        let board = Array(9).fill("");
        let mySymbol = null; 
        let currentPlayer = "X";
        let gameActive = true;

        document.getElementById('room-display').innerText = "ROOM ID: " + roomCode.toUpperCase();

        // 1. Assign Player Role
        gameRef.once('value', (snap) => {
            const data = snap.val();
            if (!data || !data.p1) {
                mySymbol = "X";
                gameRef.update({ p1: true, board: Array(9).fill(""), turn: "X", active: true });
            } else if (!data.p2) {
                mySymbol = "O";
                gameRef.update({ p2: true });
            } else {
                mySymbol = "VIEWER";
            }
            document.getElementById('player-type').innerText = "ROLE: PLAYER " + mySymbol;
        });

        // 2. Real-time Sync
        gameRef.on('value', (snap) => {
            const data = snap.val();
            if (data) {
                board = data.board || Array(9).fill("");
                currentPlayer = data.turn || "X";
                gameActive = (data.active !== undefined) ? data.active : true;
                updateUI();
                
                if (gameActive) {
                    if (currentPlayer === mySymbol) {
                        document.getElementById('status').innerText = "YOUR TURN (" + mySymbol + ")";
                        document.getElementById('status').style.color = "#00d2ff";
                    } else {
                        document.getElementById('status').innerText = "WAITING FOR OPPONENT...";
                        document.getElementById('status').style.color = "#555";
                    }
                } else {
                    checkFinalResult();
                }
            }
        });

        function makeMove(i) {
            // Strict Turn Validation
            if (board[i] === "" && gameActive && currentPlayer === mySymbol) {
                board[i] = mySymbol;
                const nextTurn = (mySymbol === "X") ? "O" : "X";
                gameRef.update({ board: board, turn: nextTurn });
            }
        }

        function updateUI() {
            board.forEach((val, i) => {
                const c = document.getElementById('c' + i);
                c.innerText = val;
                c.className = 'cell ' + val.toLowerCase();
            });
        }

        function checkFinalResult() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            let hasWinner = false;
            for (let c of wins) {
                if (board[c[0]] && board[c[0]] === board[c[1]] && board[c[0]] === board[c[2]]) {
                    const winner = board[c[0]];
                    document.getElementById('status').innerText = (winner === mySymbol ? "YOU WON! 🏆" : "PLAYER " + winner + " WON!");
                    document.getElementById('status').style.color = "#ffce00";
                    c.forEach(idx => document.getElementById('c' + idx).classList.add('winner'));
                    hasWinner = true;
                    break;
                }
            }
            if (!hasWinner && !board.includes("")) {
                document.getElementById('status').innerText = "IT'S A DRAW! 🤝";
                document.getElementById('status').style.color = "#ffffff";
            }
        }

        function requestRestart() {
            gameRef.update({ board: Array(9).fill(""), turn: "X", active: true });
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('winner'));
        }
    </script>
</body>
</html>
