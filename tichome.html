<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe - Menu</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; justify-content: center; }
        h1 { color: #00d2ff; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 30px; }
        
        .menu-grid { display: flex; flex-direction: column; gap: 15px; max-width: 320px; margin: 0 auto; width: 100%; }
        .menu-card { 
            background: #1e1e1e; padding: 20px; border-radius: 15px; 
            text-decoration: none; color: white; border: 2px solid #333; 
            transition: 0.3s; display: flex; align-items: center; gap: 15px;
            cursor: pointer;
        }
        .menu-card:active { transform: scale(0.95); background: #222; border-color: #00d2ff; }
        .icon { font-size: 30px; }
        .info h3 { margin: 0; font-size: 16px; color: #fff; }
        .info p { margin: 5px 0 0; font-size: 12px; color: #888; }

        /* Room Code Modal */
        #roomModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column; align-items: center; justify-content: center;
        }
        .modal-content { background: #1e1e1e; padding: 30px; border-radius: 20px; border: 1px solid #00d2ff; width: 85%; max-width: 300px; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid #444; background: #121212; color: white; text-align: center; font-size: 18px; box-sizing: border-box; }
        .go-btn { background: #00d2ff; color: #121212; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Tic Tac Toe</h1>

    <div class="menu-grid">
        <div class="menu-card" onclick="location.href='tictactoe/computer.html'">
            <div class="icon">🤖</div>
            <div class="info">
                <h3>Play with Computer</h3>
                <p>Easy, Normal & Hard Modes</p>
            </div>
        </div>

        <div class="menu-card" onclick="location.href='tictactoe/local.html'">
            <div class="icon">👥</div>
            <div class="info">
                <h3>Play with Friends</h3>
                <p>Pass and Play (Offline)</p>
            </div>
        </div>

        <div class="menu-card" onclick="showModal()">
            <div class="icon">🌐</div>
            <div class="info">
                <h3>Play Online</h3>
                <p>Private Room (Firebase)</p>
            </div>
        </div>
    </div>

    <div id="roomModal">
        <div class="modal-content">
            <h3 style="margin:0;">Enter Room Code</h3>
            <input type="number" id="roomCode" placeholder="Ex: 1234">
            <button class="go-btn" onclick="joinOnline()">JOIN ROOM</button>
            <p onclick="hideModal()" style="margin-top:15px; font-size:12px; color:#ff4d4d; cursor:pointer;">Cancel</p>
        </div>
    </div>

    <script>
        function showModal() { document.getElementById('roomModal').style.display = 'flex'; }
        function hideModal() { document.getElementById('roomModal').style.display = 'none'; }

        function joinOnline() {
            const code = document.getElementById('roomCode').value;
            if (code) {
                location.href = `tictactoe/online.html?room=${code}`;
            } else {
                alert("Please enter a room code!");
            }
        }
    </script>
</body>
</html>
