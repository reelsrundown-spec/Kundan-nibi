<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    
    <title>Bat Survival</title>
    <style>
        body { 
            background: #121212; 
            color: white; 
            text-align: center; 
            font-family: sans-serif; 
            margin: 0; 
            overflow: hidden; 
            touch-action: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .header { font-size: 24px; padding: 10px; color: #a29bfe; font-weight: bold; }
        
        canvas { 
            background: #000; 
            border: 2px solid #444; 
            display: block; 
            border-radius: 10px;
        }

        /* Joystick Style - Matching your old buttons color */
        .joystick-base {
            margin-top: 30px;
            width: 100px;
            height: 100px;
            background: #2d3436;
            border-radius: 50%;
            position: relative;
            border: 2px solid #636e72;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #joystick-stick {
            width: 45px;
            height: 45px;
            background: #00cec9;
            border-radius: 50%;
            position: absolute;
            transition: transform 0.1s ease-out;
        }

        #status-msg {
            position: absolute;
            top: 20%;
            color: #ff7675;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

    <div class="header">Score: <span id="scoreVal">0</span></div>
    <div id="status-msg">GAME OVER - RESTARTING...</div>

    <canvas id="gameCanvas"></canvas>

    <div class="joystick-base" id="joyBase">
        <div id="joystick-stick"></div>
    </div>

    <script src="js/bat-logic.js"></script>
</body>
</html>
