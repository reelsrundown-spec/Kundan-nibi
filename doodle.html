<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doodle Jump - Game Hub</title>
    <style>
        body { text-align: center; font-family: sans-serif; margin: 0; background-color: #f0f0f0; overflow: hidden; touch-action: none; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; max-width: 350px; margin: 0 auto; background: #fff; border-bottom: 2px solid #ddd; }
        .back-btn { background: #2c3e50; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; text-decoration: none; font-size: 14px; }
        canvas { display: block; margin: 0 auto; background: #faf8ef; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        #score { font-weight: bold; color: #333; font-size: 18px; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="home.html" class="back-btn">← Back</a>
        <div id="score">0</div>
    </div>
    
    <canvas id="doodleCanvas" width="350" height="500"></canvas>

    <script>
        const canvas = document.getElementById("doodleCanvas");
        const ctx = canvas.getContext("2d");
        const scoreDisplay = document.getElementById("score");

        let player = { x: 175, y: 350, width: 40, height: 40, dy: 0, jump: -10 };
        let platforms = [];
        let score = 0;
        let gravity = 0.3;
        let gameState = "PLAY";

        // Initial platforms
        for (let i = 0; i < 7; i++) {
            platforms.push({ x: Math.random() * (canvas.width - 60), y: i * 80, width: 60, height: 10 });
        }

        // Touch control
        document.addEventListener("touchmove", (e) => {
            if (gameState !== "PLAY") return;
            let relativeX = e.touches[0].clientX - canvas.offsetLeft;
            if (relativeX > 0 && relativeX < canvas.width) {
                player.x = relativeX - player.width / 2;
            }
        });

        canvas.addEventListener("click", () => {
            if (gameState === "OVER") location.reload();
        });

        function update() {
            if (gameState !== "PLAY") return;

            player.dy += gravity;
            player.y += player.dy;

            // Platform collision
            if (player.dy > 0) {
                platforms.forEach(p => {
                    if (player.x + player.width > p.x && player.x < p.x + p.width &&
                        player.y + player.height > p.y && player.y + player.height < p.y + p.height + player.dy) {
                        player.dy = player.jump;
                    }
                });
            }

            // Move screen down
            if (player.y < canvas.height / 2) {
                let diff = canvas.height / 2 - player.y;
                player.y = canvas.height / 2;
                score += Math.floor(diff / 10);
                scoreDisplay.innerText = score;

                platforms.forEach(p => {
                    p.y += diff;
                    if (p.y > canvas.height) {
                        p.y = 0;
                        p.x = Math.random() * (canvas.width - 60);
                    }
                });
            }

            // Game Over
            if (player.y > canvas.height) gameState = "OVER";
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameState === "PLAY") {
                // Draw Player
                ctx.fillStyle = "#2ecc71";
                ctx.fillRect(player.x, player.y, player.width, player.height);

                // Draw Platforms
                ctx.fillStyle = "#e67e22";
                platforms.forEach(p => ctx.fillRect(p.x, p.y, p.width, p.height));
            } else {
                ctx.fillStyle = "rgba(0,0,0,0.7)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.font = "bold 30px Arial";
                ctx.textAlign = "center";
                ctx.fillText("\u0D28\u0D40 \u0D1A\u0D24\u0D4D\u0D24\u0D41!", canvas.width / 2, canvas.height / 2); // നീ ചത്തു!
                ctx.font = "16px Arial";
                ctx.fillText("Tap to Restart", canvas.width / 2, canvas.height / 2 + 40);
            }

            update();
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
