<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brick Breaker - Game Hub</title>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; margin: 0; padding-top: 10px; background-color: #121212; color: white; overflow: hidden; touch-action: none; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; max-width: 320px; margin: 0 auto; }
        .back-btn { background: #2c3e50; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; text-decoration: none; font-size: 14px; }
        canvas { border: 3px solid #00d2ff; background: #1e1e1e; border-radius: 15px; display: block; margin: 20px auto; max-width: 95%; height: auto; box-shadow: 0 0 20px rgba(0, 210, 255, 0.2); }
        .info { color: #555; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="home.html" class="back-btn">← Back</a>
        <div id="score" style="font-weight: bold; color: #00d2ff;">Score: 0</div>
    </div>
    
    <canvas id="brickCanvas" width="320" height="400"></canvas>
    <p class="info">Slide to move the paddle</p>

    <script>
        const canvas = document.getElementById("brickCanvas");
        const ctx = canvas.getContext("2d");
        const scoreDisplay = document.getElementById("score");

        let score = 0, ballRadius = 8, x = canvas.width / 2, y = canvas.height - 30;
        let dx = 3, dy = -3, paddleHeight = 12, paddleWidth = 85, paddleX = (canvas.width - paddleWidth) / 2;
        let brickRowCount = 5, brickColumnCount = 4, brickWidth = 70, brickHeight = 20;
        let brickPadding = 5, brickOffsetTop = 40, brickOffsetLeft = 12;
        let gameState = "PLAY"; // PLAY, OVER, WIN

        let bricks = [];
        for (let c = 0; c < brickColumnCount; c++) {
            bricks[c] = [];
            for (let r = 0; r < brickRowCount; r++) {
                bricks[c][r] = { x: 0, y: 0, status: 1 };
            }
        }

        document.addEventListener("touchmove", (e) => {
            if (gameState !== "PLAY") return;
            let relativeX = e.touches[0].clientX - canvas.offsetLeft;
            if (relativeX > 0 && relativeX < canvas.width) {
                paddleX = relativeX - paddleWidth / 2;
            }
        });

        canvas.addEventListener("click", () => {
            if (gameState !== "PLAY") document.location.reload();
        });

        function collisionDetection() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    let b = bricks[c][r];
                    if (b.status === 1) {
                        if (x > b.x && x < b.x + brickWidth && y > b.y && y < b.y + brickHeight) {
                            dy = -dy;
                            b.status = 0;
                            score++;
                            scoreDisplay.innerText = "Score: " + score;
                            if (score === brickRowCount * brickColumnCount) gameState = "WIN";
                        }
                    }
                }
            }
        }

        function drawBall() {
            ctx.beginPath();
            ctx.arc(x, y, ballRadius, 0, Math.PI * 2);
            ctx.fillStyle = "#ffce00";
            ctx.fill();
            ctx.closePath();
        }

        function drawPaddle() {
            ctx.beginPath();
            ctx.roundRect(paddleX, canvas.height - paddleHeight, paddleWidth, paddleHeight, 5);
            ctx.fillStyle = "#00d2ff";
            ctx.fill();
            ctx.closePath();
        }

        function drawBricks() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    if (bricks[c][r].status === 1) {
                        let brickX = (c * (brickWidth + brickPadding)) + brickOffsetLeft;
                        let brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
                        bricks[c][r].x = brickX;
                        bricks[c][r].y = brickY;
                        ctx.beginPath();
                        ctx.roundRect(brickX, brickY, brickWidth, brickHeight, 4);
                        ctx.fillStyle = "#ff4d4d";
                        ctx.fill();
                        ctx.closePath();
                    }
                }
            }
        }

        function drawGameOver(text) {
            ctx.fillStyle = "rgba(0,0,0,0.8)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            ctx.font = "bold 28px Arial";
            ctx.textAlign = "center";
            ctx.fillText(text, canvas.width/2, canvas.height/2);
            ctx.font = "16px Arial";
            ctx.fillText("Tap to Restart", canvas.width/2, canvas.height/2 + 40);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (gameState === "PLAY") {
                drawBricks();
                drawBall();
                drawPaddle();
                collisionDetection();

                if (x + dx > canvas.width - ballRadius || x + dx < ballRadius) dx = -dx;
                if (y + dy < ballRadius) dy = -dy;
                else if (y + dy > canvas.height - ballRadius) {
                    if (x > paddleX && x < paddleX + paddleWidth) {
                        dy = -dy;
                    } else {
                        gameState = "OVER";
                    }
                }
                x += dx; y += dy;
            } else if (gameState === "OVER") {
                drawGameOver("\u0D28\u0D40 \u0D1A\u0D24\u0D4D\u0D24\u0D41!"); // നീ ചത്തു!
            } else if (gameState === "WIN") {
                drawGameOver("\u0D28\u0D40 \u0D1C\u0D2F\u0D3F\u0D1A\u0D4D\u0D1A\u0D41!"); // നീ ജയിച്ചു!
            }
            
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
