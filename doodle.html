<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doodle Jump Pro</title>
    <style>
        body { text-align: center; font-family: sans-serif; margin: 0; background-color: #f0f0f0; overflow: hidden; touch-action: none; -webkit-user-select: none; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; max-width: 350px; margin: 0 auto; background: #fff; border-bottom: 2px solid #ddd; }
        .back-btn { background: #2c3e50; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; text-decoration: none; font-size: 14px; }
        canvas { display: block; margin: 10px auto; background: linear-gradient(#e0f7fa, #faf8ef); box-shadow: 0 0 20px rgba(0,0,0,0.1); border-radius: 10px; }
        #score { font-weight: bold; color: #333; font-size: 18px; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="home.html" class="back-btn"><- Back</a>
        <div id="score">Score: 0</div>
    </div>
    
    <canvas id="doodleCanvas" width="350" height="500"></canvas>

    <script>
        const canvas = document.getElementById("doodleCanvas");
        const ctx = canvas.getContext("2d");
        const scoreDisplay = document.getElementById("score");

        // Audio Assets (Same as Dino Game)
        const jumpSound = new Audio('jump.mp3');
        const coinSound = new Audio('coin.mp3');
        const gameOverSound = new Audio('gameover.mp3');

        let player = { x: 155, y: 350, width: 35, height: 35, dy: 0, jump: -10 };
        let platforms = [];
        let coins = [];
        let score = 0;
        let totalCoins = 0;
        let gravity = 0.35;
        let gameState = "PLAY";

        function initGame() {
            platforms = [];
            coins = [];
            score = 0;
            totalCoins = 0;
            player.y = 350;
            player.dy = 0;
            for (let i = 0; i < 7; i++) {
                addPlatform(i * 80);
            }
        }

        function addPlatform(yPos) {
            let platX = Math.random() * (canvas.width - 65);
            platforms.push({ 
                x: platX, 
                y: yPos, 
                width: 65, 
                height: 12,
                isMoving: Math.random() > 0.7,
                speed: Math.random() > 0.5 ? 1.5 : -1.5
            });

            // Add a coin on top of some platforms
            if (Math.random() > 0.5) {
                coins.push({ x: platX + 25, y: yPos - 25, radius: 8, active: true });
            }
        }

        document.addEventListener("touchmove", (e) => {
            if (gameState !== "PLAY") return;
            let rect = canvas.getBoundingClientRect();
            player.x = (e.touches[0].clientX - rect.left) - player.width / 2;
        });

        canvas.addEventListener("click", () => {
            if (gameState === "OVER") {
                initGame();
                gameState = "PLAY";
            }
        });

        function update() {
            if (gameState !== "PLAY") return;

            player.dy += gravity;
            player.y += player.dy;

            if (player.x + player.width < 0) player.x = canvas.width;
            if (player.x > canvas.width) player.x = -player.width;

            // Platform Collision
            platforms.forEach(p => {
                if (p.isMoving) {
                    p.x += p.speed;
                    if (p.x < 0 || p.x + p.width > canvas.width) p.speed *= -1;
                }
                if (player.dy > 0 && player.x + player.width > p.x && player.x < p.x + p.width &&
                    player.y + player.height > p.y && player.y + player.height < p.y + p.height + player.dy) {
                    player.dy = player.jump;
                    jumpSound.play(); // Play Jump Sound
                }
            });

            // Coin Collection Logic
            coins.forEach(c => {
                if (c.active && player.x < c.x + c.radius && player.x + player.width > c.x - c.radius &&
                    player.y < c.y + c.radius && player.y + player.height > c.y - c.radius) {
                    c.active = false;
                    totalCoins++;
                    score += 50;
                    coinSound.play(); // Play Coin Sound
                }
            });

            // Scrolling
            if (player.y < canvas.height / 2.5) {
                let diff = canvas.height / 2.5 - player.y;
                player.y = canvas.height / 2.5;
                score += 1;
                scoreDisplay.innerText = "Score: " + score;

                platforms.forEach(p => {
                    p.y += diff;
                    if (p.y > canvas.height) {
                        platforms.splice(platforms.indexOf(p), 1);
                        addPlatform(0);
                    }
                });
                coins.forEach(c => c.y += diff);
            }

            if (player.y > canvas.height) {
                gameState = "OVER";
                gameOverSound.play(); // Play Game Over Sound
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (gameState === "PLAY") {
                // Draw Player
                ctx.fillStyle = "#2ecc71";
                ctx.fillRect(player.x, player.y, player.width, player.height);
                
                // Draw Platforms
                platforms.forEach(p => {
                    ctx.fillStyle = p.isMoving ? "#3498db" : "#e67e22";
                    ctx.fillRect(p.x, p.y, p.width, p.height);
                });

                // Draw Coins
                ctx.fillStyle = "#f1c40f";
                coins.forEach(c => {
                    if (c.active) {
                        ctx.beginPath();
                        ctx.arc(c.x, c.y, c.radius, 0, Math.PI * 2);
                        ctx.fill();
                    }
                });
            } else {
                ctx.fillStyle = "rgba(0,0,0,0.8)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.font = "bold 30px Arial";
                ctx.textAlign = "center";
                ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 20);
                ctx.font = "20px Arial";
                ctx.fillText("Score: " + score, canvas.width / 2, canvas.height / 2 + 20);
                ctx.fillText("Tap to Restart", canvas.width / 2, canvas.height / 2 + 60);
            }
            update();
            requestAnimationFrame(draw);
        }

        initGame();
        draw();
    </script>
</body>
</html>
