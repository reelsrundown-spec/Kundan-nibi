<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Hub - Welcome</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: #121212;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: sans-serif;
            overflow: hidden;
        }
        .welcome-box {
            padding: 40px 60px;
            background: #1e1e1e;
            border: 3px solid #00d2ff;
            border-radius: 20px;
            text-decoration: none;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
            transition: 0.3s;
            text-align: center;
            cursor: pointer;
        }
        .welcome-box:active { transform: scale(0.9); }
        .welcome-box h2 {
            margin: 0;
            color: #00d2ff;
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .footer-text { color: #555; margin-top: 15px; position: absolute; bottom: 50px; }

        .settings-btn {
            position: absolute; top: 20px; right: 20px;
            background: none; border: none; cursor: pointer; font-size: 30px;
            z-index: 100;
        }
        #settingsMenu {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000;
            align-items: center; justify-content: center; color: white;
        }
        .menu-content {
            background: #222; padding: 30px; border-radius: 20px;
            border: 2px solid #00d2ff; text-align: center; width: 250px;
        }
        .toggle-btn {
            background: #4CAF50; border: none; padding: 10px 20px;
            border-radius: 5px; font-weight: bold; cursor: pointer; min-width: 80px;
            color: white;
        }
        .close-btn {
            background: none; border: 1px solid white; color: white; 
            padding: 8px 20px; border-radius: 5px; cursor: pointer; margin-top: 20px;
        }
    </style>
        <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('Service Worker Registered'))
            .catch(err => console.log('Service Worker Failed', err));
        });
      }
    </script>
    
</head>
<body>

    <button class="settings-btn" onclick="openSettings()">⚙️</button>

    <div class="welcome-box" onclick="startExperience()">
        <h2>ALL GAMES</h2>
    </div>

    <p class="footer-text">Tap the box to start</p>

    <div id="settingsMenu">
        <div class="menu-content">
            <h2 style="color:#00d2ff">SETTINGS</h2>
            <div style="margin: 30px 0; display: flex; justify-content: space-between; align-items: center;">
                <span>Music & Sound</span>
                <button id="musicToggle" class="toggle-btn" onclick="toggleMusic()">ON</button>
            </div>
            <button class="close-btn" onclick="closeSettings()">CLOSE</button>
        </div>
    </div>

    <script>
        const settingsMenu = document.getElementById('settingsMenu');
        const musicToggle = document.getElementById('musicToggle');
        
        const bgMusic = new Audio('bgm.mp3');
        bgMusic.loop = true;
        let musicEnabled = true;

        if(localStorage.getItem('musicPref') === 'off') {
            musicEnabled = false;
            musicToggle.innerText = "OFF";
            musicToggle.style.background = "#00d2ff";
        }

        function startExperience() {
            if (musicEnabled) {
                bgMusic.play().then(() => {
                    setTimeout(() => {
                        window.location.href = "home.html";
                    }, 200); 
                }).catch(e => {
                    window.location.href = "home.html";
                });
            } else {
                window.location.href = "home.html";
            }
        }

        function openSettings() { settingsMenu.style.display = 'flex'; }
        function closeSettings() { settingsMenu.style.display = 'none'; }
        
        function toggleMusic() {
            musicEnabled = !musicEnabled;
            musicToggle.innerText = musicEnabled ? "ON" : "OFF";
            musicToggle.style.background = musicEnabled ? "#4CAF50" : "#00d2ff";
            localStorage.setItem('musicPref', musicEnabled ? 'on' : 'off');
        }
    </script>

</body>
</html>
