<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dino Jump Pro</title>
    <style>
        body { text-align: center; font-family: Arial; margin: 0; padding-top: 10px; background-color: #f0f0f0; overflow: hidden; touch-action: manipulation; -webkit-user-select: none; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; max-width: 320px; margin: 0 auto; }
        .back-btn { background: #2c3e50; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; text-decoration: none; font-size: 14px; }
        .score-board { font-size: 18px; font-weight: bold; color: #333; }
        canvas { border: 4px solid #2c3e50; background: #87CEEB; border-radius: 15px; box-shadow: 0px 10px 25px rgba(0,0,0,0.3); max-width: 95%; height: auto; display: block; margin: 0 auto; }
        p { color: #666; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="index.html" class="back-btn">← Back</a>
        <div class="score-board">Score: <span id="scoreVal">0</span></div>
    </div>
    
    <canvas id="gameCanvas" width="320" height="200"></canvas>
    <p>Tap to Jump!</p>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreDisplay = document.getElementById("scoreVal");

        let x, y, dy, isJumping, score, coins, obsX, obsY, obsSpeed, clouds, gameState;
        let coinX, coinY, coinActive;
        const START = 0, PLAY = 1, OVER = 2;

        function resetGame() {
            x = 40; y = 150; dy = 0; isJumping = false; 
            score = 0; coins = 0;
            scoreDisplay.innerText = score;
            obsX = 400; obsY = 155; obsSpeed = 3.5;
            coinX = 250; coinY = 120; coinActive = true; 
            gameState = START;
            clouds = [{x: 50, y: 30, s: 0.5}, {x: 200, y: 60, s: 0.3}, {x: 350, y: 40, s: 0.4}];
        }

        function drawDino(px, py) {
            ctx.fillStyle = "#2ecc71"; ctx.fillRect(px, py, 20, 20);
            ctx.fillStyle = "black"; ctx.fillRect(px + 14, py + 4, 3, 3);
            ctx.fillStyle = "#333"; ctx.fillRect(px + 2, py + 20, 5, 2); ctx.fillRect(px + 12, py + 20, 5, 2);
        }

        function draw() {
            ctx.fillStyle = "#87CEEB"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white"; clouds.forEach(c => {
                ctx.beginPath(); ctx.arc(c.x, c.y, 10, 0, Math.PI * 2); ctx.fill();
                if (gameState !== OVER) { c.x -= c.s; if (c.x < -30) c.x = 350; }
            });
            ctx.fillStyle = "#795548"; ctx.fillRect(0, 170, canvas.width, 30);
            ctx.fillStyle = "#4CAF50"; ctx.fillRect(0, 170, canvas.width, 5);

            ctx.fillStyle = "#FFD700"; ctx.font = "bold 15px Arial";
            ctx.fillText("Coins: " + coins, 230, 25);

            if (gameState === START) {
                drawDino(x, y);
                ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(40, 70, 240, 60);
                ctx.fillStyle = "white"; ctx.font = "bold 18px Arial"; ctx.fillText("TAP TO START", 95, 105);
            } else if (gameState === PLAY) {
                drawDino(x, y);
                ctx.fillStyle = "#1b5e20"; ctx.fillRect(obsX, obsY, 15, 25);
                obsX -= obsSpeed; 
                if (obsX < -25) { obsX = 350 + Math.random() * 100; score++; scoreDisplay.innerText = score; obsSpeed += 0.08; }

                if (coinActive) {
                    ctx.fillStyle = "#FFD700"; ctx.beginPath(); ctx.arc(coinX, coinY, 8, 0, Math.PI * 2); ctx.fill();
                    coinX -= obsSpeed;
                    if (x < coinX + 8 && x + 20 > coinX - 8 && y < coinY + 8 && y + 20 > coinY - 8) {
                        coins++; score += 10; scoreDisplay.innerText = score; coinActive = false;
                    }
                }
                if (coinX < -20 || !coinActive) { coinX = canvas.width + 150 + Math.random() * 300; coinY = 100 + Math.random() * 50; coinActive = true; }

                if (isJumping) { y += dy; dy += 0.6; if (y >= 150) { y = 150; isJumping = false; } }
                if (x < obsX + 15 && x + 20 > obsX && y < obsY + 25 && y + 20 > obsY) gameState = OVER;
            } else if (gameState === OVER) {
                drawDino(x, y);
                ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.fillRect(40, 65, 240, 70);
                ctx.fillStyle = "white"; ctx.font = "bold 25px Arial"; 
                // Unicode for "നീ ചത്തു"
                ctx.fillText("\u0D27\u0D40 \u0D1A\u0D24\u0D4D\u0D24\u0D41", 110, 105); 
            }
            requestAnimationFrame(draw);
        }

        window.addEventListener("touchstart", function(e) {
            if (e.target.tagName === 'A') return; // Prevent jump when clicking Back button
            e.preventDefault();
            if (gameState === START) gameState = PLAY;
            else if (gameState === PLAY && !isJumping) { dy = -9.5; isJumping = true; }
            else if (gameState === OVER) resetGame();
        }, { passive: false });

        resetGame(); draw();
    </script>
</body>
</html>
