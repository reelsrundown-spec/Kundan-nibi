<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo - Game Hub</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 10px; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; max-width: 400px; margin: 0 auto; }
        .back-btn { background: #2c3e50; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; text-decoration: none; font-size: 14px; }
        h2 { color: #ffce00; margin-top: 10px; letter-spacing: 5px; }
        .bingo-letters { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; font-size: 24px; font-weight: bold; }
        .letter { opacity: 0.2; transition: 0.3s; color: #ffce00; }
        .letter.active { opacity: 1; text-shadow: 0 0 10px #ffce00; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; max-width: 350px; margin: 0 auto; background: #333; padding: 10px; border-radius: 12px; }
        .cell { aspect-ratio: 1; background: #1e1e1e; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.2s; border: 1px solid #444; }
        .cell.marked { background: #ffce00; color: #121212; border-color: #fff; transform: scale(0.95); }
        #status { margin-top: 20px; font-size: 1.1rem; color: #aaa; height: 25px; }
        .reset-btn { margin-top: 20px; padding: 12px 30px; background: #ffce00; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: #121212; }
    </style>
</head>
<body>
    <div class="nav-bar">
        <a href="index.html" class="back-btn">← Back</a>
        <span>BINGO</span>
    </div>
    <h2>BINGO</h2>
    <div class="bingo-letters" id="bingoDisplay">
        <span class="letter">B</span><span class="letter">I</span><span class="letter">N</span><span class="letter">G</span><span class="letter">O</span>
    </div>
    <div class="grid" id="bingoGrid"></div>
    <div id="status">Your Turn!</div>
    <button class="reset-btn" onclick="initBingo()">New Game</button>

    <script>
        let playerBoard = [];
        let markedIndices = new Set();
        let bingoCount = 0;
        let gameActive = true;

        function initBingo() {
            const gridElement = document.getElementById('bingoGrid');
            gridElement.innerHTML = '';
            playerBoard = [];
            markedIndices.clear();
            bingoCount = 0;
            gameActive = true;
            updateBingoDisplay();
            document.getElementById('status').innerText = "Click a number!";
            let nums = Array.from({length: 25}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
            nums.forEach((num, index) => {
                playerBoard.push(num);
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerText = num;
                cell.onclick = () => handleMove(index);
                gridElement.appendChild(cell);
            });
        }

        function handleMove(index) {
            if (!gameActive || markedIndices.has(index)) return;
            markCell(index);
            if (gameActive) {
                document.getElementById('status').innerText = "AI is thinking...";
                setTimeout(cpuMove, 600);
            }
        }

        function markCell(index) {
            markedIndices.add(index);
            const cells = document.querySelectorAll('.cell');
            cells[index].classList.add('marked');
            checkBingo();
        }

        function cpuMove() {
            if (!gameActive) return;
            let unmarked = playerBoard.map((_, i) => !markedIndices.has(i) ? i : null).filter(v => v !== null);
            if (unmarked.length > 0) {
                markCell(unmarked[Math.floor(Math.random() * unmarked.length)]);
                if (gameActive) document.getElementById('status').innerText = "Your Turn!";
            }
        }

        function checkBingo() {
            let lines = 0;
            const size = 5;
            for (let i = 0; i < size; i++) {
                let row = true, col = true;
                for (let j = 0; j < size; j++) {
                    if (!markedIndices.has(i * size + j)) row = false;
                    if (!markedIndices.has(j * size + i)) col = false;
                }
                if (row) lines++;
                if (col) lines++;
            }
            let d1 = true, d2 = true;
            for (let i = 0; i < size; i++) {
                if (!markedIndices.has(i * size + i)) d1 = false;
                if (!markedIndices.has(i * size + (size - 1 - i))) d2 = false;
            }
            if (d1) lines++; if (d2) lines++;
            bingoCount = lines;
            updateBingoDisplay();
            if (bingoCount >= 5) {
                // Unicode for: നീ ജയിച്ചു! 🎉
                document.getElementById('status').innerText = "\u0D28\u0D40 \u0D1C\u0D2F\u0D30\u0D4D\u0D1A\u0D4D\u0D1A\u0D41! 🎉";
                gameActive = false;
            }
        }

        function updateBingoDisplay() {
            const letters = document.querySelectorAll('.letter');
            letters.forEach((l, i) => l.className = i < bingoCount ? 'letter active' : 'letter');
        }
        initBingo();
    </script>
</body>
  </html>
