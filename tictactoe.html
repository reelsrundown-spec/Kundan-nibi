<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe - AI Master</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 10px; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; max-width: 400px; margin: 0 auto; }
        .back-btn { background: #2c3e50; color: white; border: none; padding: 10px 18px; border-radius: 12px; text-decoration: none; font-size: 14px; font-weight: bold; }
        
        #status { font-size: 1.3rem; margin: 20px 0; font-weight: bold; height: 35px; color: #00d2ff; }
        
        /* Difficulty Selector */
        .level-container { margin-bottom: 20px; display: none; }
        .level-btn { background: #333; color: white; border: 1px solid #555; padding: 8px 15px; margin: 0 5px; border-radius: 8px; cursor: pointer; }
        .level-btn.active { background: #00d2ff; color: #121212; border-color: #00d2ff; }

        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 300px; margin: 0 auto; background: #222; padding: 12px; border-radius: 15px; }
        .cell { width: 90px; height: 90px; background: #1a1a1a; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .cell.x { color: #ff6b6b; }
        .cell.o { color: #00d2ff; }
        .cell.winner { background: #00d2ff !important; color: #121212 !important; animation: pulse 0.8s infinite; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .controls { margin-top: 25px; }
        .restart-btn { background: #ffce00; color: #121212; border: none; padding: 12px 30px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="tichome.html" class="back-btn">← Back</a>
        <span id="mode-title">TIC TAC TOE</span>
    </div>

    <div id="status">Wait...</div>

    <div class="level-container" id="level-ui">
        <button class="level-btn active" onclick="setLevel('easy', this)">EASY</button>
        <button class="level-btn" onclick="setLevel('normal', this)">NORMAL</button>
        <button class="level-btn" onclick="setLevel('hard', this)">HARD</button>
    </div>

    <div class="board" id="board">
        <div class="cell" onclick="handleMove(0)" id="c0"></div>
        <div class="cell" onclick="handleMove(1)" id="c1"></div>
        <div class="cell" onclick="handleMove(2)" id="c2"></div>
        <div class="cell" onclick="handleMove(3)" id="c3"></div>
        <div class="cell" onclick="handleMove(4)" id="c4"></div>
        <div class="cell" onclick="handleMove(5)" id="c5"></div>
        <div class="cell" onclick="handleMove(6)" id="c6"></div>
        <div class="cell" onclick="handleMove(7)" id="c7"></div>
        <div class="cell" onclick="handleMove(8)" id="c8"></div>
    </div>

    <div class="controls">
        <button class="restart-btn" onclick="resetGame()">RESTART GAME</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode') || 'ai';
        
        let board = Array(9).fill("");
        let currentPlayer = "X"; // Human is always X
        let gameActive = true;
        let difficulty = "easy";
        let isProcessing = false; // Turn Lock check

        if (mode === 'ai') {
            document.getElementById('level-ui').style.display = 'block';
            document.getElementById('status').innerText = "Your Turn (X)";
        }

        function setLevel(lvl, btn) {
            difficulty = lvl;
            document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            resetGame();
        }

        function handleMove(i) {
            // Logic: Not empty, Game over, OR computer thinking aanenkil click cheyyaan pattilla
            if (board[i] !== "" || !gameActive || isProcessing) return;

            // Human Turn
            board[i] = "X";
            updateUI();
            
            if (!checkWin()) {
                if (mode === 'ai') {
                    isProcessing = true; // LOCK TURN
                    currentPlayer = "O";
                    document.getElementById('status').innerText = "Computer thinking...";
                    setTimeout(aiMove, 800);
                } else {
                    currentPlayer = currentPlayer === "X" ? "O" : "X";
                    document.getElementById('status').innerText = currentPlayer + "'s Turn";
                }
            }
        }

        function aiMove() {
            let move;
            if (difficulty === 'easy') {
                move = getRandomMove();
            } else if (difficulty === 'normal') {
                move = Math.random() > 0.5 ? getBestMove() : getRandomMove();
            } else {
                move = getBestMove();
            }

            if (move !== null) {
                board[move] = "O";
                updateUI();
                if (!checkWin()) {
                    currentPlayer = "X";
                    document.getElementById('status').innerText = "Your Turn (X)";
                    isProcessing = false; // UNLOCK TURN
                }
            }
        }

        function getRandomMove() {
            let available = board.map((v, i) => v === "" ? i : null).filter(v => v !== null);
            return available.length > 0 ? available[Math.floor(Math.random() * available.length)] : null;
        }

        // Minimax for Hard Level
        function getBestMove() {
            let bestScore = -Infinity;
            let move = null;
            for (let i = 0; i < 9; i++) {
                if (board[i] === "") {
                    board[i] = "O";
                    let score = minimax(board, 0, false);
                    board[i] = "";
                    if (score > bestScore) {
                        bestScore = score;
                        move = i;
                    }
                }
            }
            return move;
        }

        function minimax(currBoard, depth, isMaximizing) {
            let result = evaluateWin();
            if (result === "O") return 10;
            if (result === "X") return -10;
            if (!currBoard.includes("")) return 0;

            if (isMaximizing) {
                let bestScore = -Infinity;
                for (let i = 0; i < 9; i++) {
                    if (currBoard[i] === "") {
                        currBoard[i] = "O";
                        let score = minimax(currBoard, depth + 1, false);
                        currBoard[i] = "";
                        bestScore = Math.max(score, bestScore);
                    }
                }
                return bestScore;
            } else {
                let bestScore = Infinity;
                for (let i = 0; i < 9; i++) {
                    if (currBoard[i] === "") {
                        currBoard[i] = "X";
                        let score = minimax(currBoard, depth + 1, true);
                        currBoard[i] = "";
                        bestScore = Math.min(score, bestScore);
                    }
                }
                return bestScore;
            }
        }

        function evaluateWin() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let c of wins) {
                if (board[c[0]] && board[c[0]] === board[c[1]] && board[c[0]] === board[c[2]]) return board[c[0]];
            }
            return null;
        }

        function checkWin() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let c of wins) {
                if (board[c[0]] && board[c[0]] === board[c[1]] && board[c[0]] === board[c[2]]) {
                    document.getElementById('status').innerText = board[c[0]] === "X" ? "YOU WIN! 🎉" : "AI WINS! 🤖";
                    c.forEach(idx => document.getElementById('c' + idx).classList.add('winner'));
                    gameActive = false;
                    isProcessing = false;
                    return true;
                }
            }
            if (!board.includes("")) {
                document.getElementById('status').innerText = "DRAW! 🤝";
                gameActive = false;
                return true;
            }
            return false;
        }

        function updateUI() {
            board.forEach((val, i) => {
                const cell = document.getElementById('c' + i);
                cell.innerText = val;
                cell.className = 'cell ' + val.toLowerCase();
            });
        }

        function resetGame() {
            board = Array(9).fill("");
            currentPlayer = "X";
            gameActive = true;
            isProcessing = false;
            document.getElementById('status').innerText = "Your Turn (X)";
            document.querySelectorAll('.cell').forEach(c => {
                c.innerText = "";
                c.className = "cell";
            });
        }
    </script>
</body>
</html>
