<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>Bat Survival - Joystick Edition</title>
    <style>
        body {
            background: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            touch-action: none;
            overflow: hidden;
        }

        .score-board {
            font-size: 28px;
            font-weight: bold;
            color: #444;
            margin: 10px 0;
        }

        .canvas-container {
            padding: 10px;
            background: #e0e0e0;
            border-radius: 25px;
            box-shadow: 15px 15px 40px #bebebe, -15px -15px 40px #ffffff;
        }

        canvas {
            background: #f5f5f5;
            border-radius: 15px;
            display: block;
        }

        /* Joystick Styles */
        .joystick-container {
            margin-top: 30px;
            width: 120px;
            height: 120px;
            background: #e0e0e0;
            border-radius: 50%;
            position: relative;
            box-shadow: 8px 8px 16px #bebebe, -8px -8px 16px #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #joystick-stick {
            width: 50px;
            height: 50px;
            background: #00d2ff;
            border-radius: 50%;
            position: absolute;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.1s ease-out;
        }

        #msg {
            position: absolute;
            top: 15%;
            font-weight: bold;
            color: #ff4757;
            font-size: 22px;
            display: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="msg">GAME OVER! RESTARTING...</div>
    <div class="score-board">Score: <span id="scoreVal">0</span></div>

    <div class="canvas-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="joystick-container" id="joystick-base">
        <div id="joystick-stick"></div>
    </div>

    <script src="js/bat-logic.js"></script>
</body>
</html>
